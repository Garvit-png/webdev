name: Daily Auto Commits

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit 1 - update log file
        run: |
          mkdir -p logs
          echo "Update at $(date -u)" >> logs/activity.log
          git add logs/activity.log
          git commit -m "Daily update 1: $(date -u +'%Y-%m-%d %H:%M')"
          git push

      - name: Commit 2 - update readme timestamp
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          if grep -q "Last updated:" README.md 2>/dev/null; then
            sed -i "s/Last updated:.*/Last updated: $DATE/" README.md
          else
            echo -e "\nLast updated: $DATE" >> README.md
          fi
          git add README.md
          git commit -m "Daily update 2: README sync"
          git push

      - name: Commit 3 - update counter file
        run: |
          COUNT_FILE="logs/counter.txt"
          mkdir -p logs
          if [ -f "$COUNT_FILE" ]; then
            COUNT=$(cat "$COUNT_FILE")
          else
            COUNT=0
          fi
          COUNT=$((COUNT + 1))
          echo $COUNT > "$COUNT_FILE"
          git add "$COUNT_FILE"
          git commit -m "Daily update 3: counter -> $COUNT"
          git push
